# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  docker:release:dev:
    desc: Build all container artifacts and release dev timestamp images
    cmds:
      - ./libb3project/build.sh
      - ./ise--y2--b3--project--collector/scripts/docker-build.sh
      - ./ise--y2--b3--project--web-app/scripts/docker-build.sh
    silent: false

  deploy:latest:
    desc: Deploy the latest configuration for the application.
    cmds:
      - ansible-playbook .ansible/deploy.yml -i .ansible/inventory.ini --vault-password-file ./.vault_pass
    silent: false

  deploy:latest:verbose:
    desc: Deploy the latest configuration for the application in verbose mode.
    cmds:
      - ansible-playbook .ansible/deploy.yml -i .ansible/inventory.ini -vvv --vault-password-file ./.vault_pass
    silent: false


  nginx:
    desc: Start nginx
    cmds:
      - chmod +x ./scripts/nginx.sh
      - sudo ./scripts/nginx.sh start
    silent: true
  top:
    desc: See dashboard of durable consumers to the JetStream queue.
    cmds:
      - nats-top
    silent: true
