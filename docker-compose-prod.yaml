services:
  nats:
    image: nats:2.12.3-alpine3.22
    container_name: uploader-queue
    ports:
      - "${NATS_PORT}:4222"
    environment:
      - NATS_PORT=${NATS_PORT}
    restart: unless-stopped

  collector:
    image: mikeyfennelly/ise-y2-b3-project-collector:v1.0.0
    container_name: collector
    ports:
      - "8080:8080"
    depends_on:
      - nats

  db:
    image: postgres:17-alpine
    container_name: metrics-db
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_DB}"

  web-app:
    image: mikeyfennelly/ise-y2-b3-project-web-app:v1.0.0
    depends_on:
      - db
      - nats
    ports:
      - "${WEB_APP_PORT}:8080"
