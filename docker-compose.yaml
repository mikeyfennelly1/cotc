networks:
  messaging:
  data:
  frontend:

services:
  nats:
    image: nats:2.12.3-alpine3.22
    container_name: uploader-queue
    command: ["--port", "${NATS_PORT}", "--http_port", "8222", "--jetstream"]
    environment:
      - NATS_PORT=${NATS_PORT}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - messaging

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_DB}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data

  cotccollector:
    image: mikeyfennelly/cotccollector:latest
    environment:
      NATS_HOST: nats
      NATS_PORT: "${NATS_PORT}"
      COLLECTOR_LISTEN_PORT: 8080
    ports:
      - "${COLLECTOR_LISTEN_PORT}:8080"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - messaging

  cotcsubscriber:
    image: mikeyfennelly/cotcsubscriber:latest
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST}"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      WEB_APP_PORT: 8080
      NATS_HOST: nats
      NATS_PORT: "${NATS_PORT}"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/serviceAccount.json"
    ports:
      - "${WEB_APP_PORT}:8080"
    networks:
      - data
      - frontend
      - messaging

  api-gateway:
    image: nginx:1.28-alpine3.23
    volumes:
      - ./.nginx/nginx.docker.conf:/etc/nginx/templates/default.conf.template
    depends_on:
      - cotcsubscriber
      - cotccollector
    environment:
      # Restrict substitution to only these vars so nginx's own $host, $remote_addr, etc. are left intact
      NGINX_ENVSUBST_TEMPLATE_VARS: "NGINX_PORT NGINX_SERVER_NAME"
      NGINX_PORT: "${NGINX_PORT}"
      NGINX_SERVER_NAME: "${NGINX_SERVER_NAME}"
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    networks:
      - frontend
      - messaging
