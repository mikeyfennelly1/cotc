services:
  nats:
    image: nats:2.12.3-alpine3.22
    container_name: uploader-queue
    ports:
      - "${NATS_PORT}:4222"
    environment:
      - NATS_PORT=${NATS_PORT}
    restart: unless-stopped

  collector:
    build: ./ise--y2--b3--project--collector
    ports:
      - "8080:8080"
    depends_on:
      - nats

  db:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_DB}"

  web-app:
    build: ./ise--y2--b3--project--web-app
    depends_on:
     - db
    ports:
      - "${WEB_APP_PORT}:8080"
