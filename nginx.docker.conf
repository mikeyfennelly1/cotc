server {
    listen 8080;
    server_name api-gateway;

    # Optional: increase proxy buffer sizes if needed
    proxy_buffering off;

    # ── Collector Swagger docs ────────────────────────────────────────────────
    location = /api/collector/docs {
        return 302 /api/collector/swagger-ui/index.html;
    }

    # Proxy swagger-ui assets and api-docs under the collector prefix.
    # Must appear before the generic /api/collector location so regex
    # matching picks this up first.
    location ~ ^/api/collector/(swagger-ui|v3|webjars) {
        rewrite ^/api/collector/(.*)$ /$1 break;
        proxy_pass http://collector:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # The swagger-ui JS requests /v3/api-docs/* with absolute paths, so we
    # need a global route for those (collector uses springdoc defaults).
    location ~ ^/v3/ {
        proxy_pass http://collector:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Web-app Swagger docs ──────────────────────────────────────────────────
    location = /api/web-app/docs {
        return 302 /api/web-app/swagger-ui/index.html;
    }

    # Proxy swagger-ui assets and webjars under the web-app prefix.
    location ~ ^/api/web-app/(swagger-ui|webjars) {
        rewrite ^/api/web-app/(.*)$ /$1 break;
        proxy_pass http://web-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # The swagger-ui JS requests /api-docs/* with absolute paths (web-app
    # configures springdoc.api-docs.path=/api-docs).
    location ~ ^/api-docs {
        proxy_pass http://web-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── API routes ────────────────────────────────────────────────────────────
    location ~ ^/api/consumer(/.*)?$ {
        proxy_pass http://web-app:8080;

        # Preserve original request metadata
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeouts (recommended for APIs)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/reporting(/.*)?$ {
        proxy_pass http://web-app:8080;

        # Preserve original request metadata
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeouts (recommended for APIs)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/collector(/.*)?$ {
        proxy_pass http://collector:8080;

        # Preserve original request metadata
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeouts (recommended for APIs)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
