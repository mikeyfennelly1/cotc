apiVersion: v1
kind: Service
metadata:
  name: {{ include "cotc.natsServiceName" . }}
  labels:
    {{- include "cotc.labels" . | nindent 4 }}
    {{- include "cotc.selectorLabels" (dict "root" . "component" "nats") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cotc.selectorLabels" (dict "root" . "component" "nats") | nindent 4 }}
  ports:
    - name: client
      port: {{ .Values.nats.port }}
      targetPort: client
    - name: monitoring
      port: {{ .Values.nats.monitoringPort }}
      targetPort: monitoring
