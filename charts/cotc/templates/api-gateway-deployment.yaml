apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cotc.fullname" . }}-api-gateway
  labels:
    {{- include "cotc.labels" . | nindent 4 }}
    {{- include "cotc.selectorLabels" (dict "root" . "component" "api-gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "cotc.selectorLabels" (dict "root" . "component" "api-gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cotc.selectorLabels" (dict "root" . "component" "api-gateway") | nindent 8 }}
      # Restart nginx pods when the configmap changes
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/api-gateway-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}"
          imagePullPolicy: {{ .Values.apiGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.port }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "cotc.fullname" . }}-nginx-conf
